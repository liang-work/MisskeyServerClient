<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compose - Misskey Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --primary-color: #4a9eff;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark-theme {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e8e8e8;
            --text-muted: #a0a0a0;
            --border-color: #2a2a4a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: var(--transition);
            min-height: 100vh;
        }
        .navbar {
            background: var(--primary-gradient) !important;
            box-shadow: var(--shadow-md);
        }
        .compose-container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .compose-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
        }
        .compose-textarea {
            width: 100%;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            resize: none;
            font-size: 1.1rem;
            min-height: 200px;
            background: var(--card-bg);
            color: var(--text-color);
            transition: var(--transition);
        }
        .compose-textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.15);
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .toolbar-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }
        .toolbar-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .btn-compose {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px 32px;
            border-radius: 25px;
            font-weight: 600;
            transition: var(--transition);
        }
        .btn-compose:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            color: white;
        }
        .btn-compose:disabled { opacity: 0.6; transform: none; }
        .preview-box {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-color);
            border-radius: var(--radius-md);
            min-height: 100px;
        }
        .preview-box h6 { color: var(--text-muted); margin-bottom: 0.75rem; }
        .tag-badge {
            background: rgba(74, 158, 255, 0.15);
            color: var(--primary-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 4px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .file-preview {
            position: relative;
            display: inline-block;
            margin: 8px 8px 0 0;
        }
        .file-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
        }
        .file-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            border: 2px solid white;
            cursor: pointer;
        }
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
        }
        .custom-toast {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid var(--primary-color);
        }
        .custom-toast.success { border-left-color: #2ecc71; }
        .custom-toast.error { border-left-color: #e74c3c; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="/">
                <i class="bi bi-chat-quote me-2"></i>Misskey
            </a>
            <a href="/" class="btn btn-light btn-sm">
                <i class="bi bi-house me-1"></i>Home
            </a>
        </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>

    <div class="compose-container">
        <div class="compose-card animate__animated animate__fadeInUp">
            <h4 class="mb-4 fw-bold">
                <i class="bi bi-pencil-square me-2" style="color: var(--primary-color);"></i>[[ tr('compose') ]]
            </h4>
            
            <textarea class="compose-textarea" v-model="composeText" :placeholder="tr('placeholder')"></textarea>
            
            <div v-if="composeFiles.length > 0" class="mt-3">
                <div v-for="(file, index) in composeFiles" :key="index" class="file-preview">
                    <img v-if="file.type && file.type.startsWith('image/')" :src="file.thumbnailUrl || file.url">
                    <div v-else class="p-3 bg-light rounded">[[ file.name ]]</div>
                    <button class="file-remove" @click="removeFile(index)">
                        <i class="bi bi-x"></i>
                    </button>
                </div>
            </div>
            
            <div v-if="composeTags.length > 0" class="mt-3">
                <span v-for="tag in composeTags" :key="tag" class="tag-badge" @click="removeTag(tag)">
                    #[[ tag ]] <i class="bi bi-x"></i>
                </span>
            </div>
            
            <div v-if="scheduledTime" class="schedule-info mt-3" style="color: var(--primary-color);">
                <i class="bi bi-clock me-1"></i> Scheduled: [[ formatScheduleTime(scheduledTime) ]]
            </div>
            
            <div class="toolbar">
                <button class="toolbar-btn" @click="insertMFM('**', '**')" title="Bold">
                    <i class="bi bi-type-bold"></i>
                </button>
                <button class="toolbar-btn" @click="insertMFM('*', '*')" title="Italic">
                    <i class="bi bi-type-italic"></i>
                </button>
                <button class="toolbar-btn" @click="insertMFM('~~', '~~')" title="Strikethrough">
                    <i class="bi bi-type-strikethrough"></i>
                </button>
                <button class="toolbar-btn" @click="insertMFM('`', '`')" title="Code">
                    <i class="bi bi-code-slash"></i>
                </button>
                <button class="toolbar-btn" @click="insertMFM('[', '](url)')" title="Link">
                    <i class="bi bi-link-45deg"></i>
                </button>
                <button class="toolbar-btn" @click="insertMFM('$[ruby ', ']')" title="Ruby">
                    <i class="bi bi-type"></i>
                </button>
                <button class="toolbar-btn" @click="insertMFM('<center>', '</center>')" title="Center">
                    <i class="bi bi-align-center"></i>
                </button>
                <button class="toolbar-btn" @click="insertMFM('>', '')" title="Quote">
                    <i class="bi bi-quote"></i>
                </button>
                <button class="toolbar-btn" @click="showFilePicker = true" title="Add File">
                    <i class="bi bi-paperclip"></i>
                </button>
                <button class="toolbar-btn" @click="showTagInput = true" title="Add Tag">
                    <i class="bi bi-hash"></i>
                </button>
                <button class="toolbar-btn" @click="showScheduleInput = true" title="Schedule">
                    <i class="bi bi-clock"></i>
                </button>
                <button class="toolbar-btn" @click="showCwInput = !showCwInput" title="CW">
                    <i class="bi bi-eye-slash"></i>
                </button>
            </div>
            
            <div v-if="showCwInput" class="mt-3">
                <input type="text" class="form-control" v-model="composeCw" placeholder="Content warning">
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-4">
                <select v-model="composeVisibility" class="form-select" style="width: auto;">
                    <option value="public">Public</option>
                    <option value="home">Home</option>
                    <option value="followers">Followers</option>
                    <option value="specified">Specified</option>
                </select>
                <button class="btn btn-compose" @click="postNote" :disabled="!canPost || posting">
                    <span v-if="posting" class="spinner-border spinner-border-sm me-2"></span>
                    <span v-else><i class="bi bi-send me-2"></i>Post</span>
                </button>
            </div>
            
            <div class="preview-box mt-4" v-if="composeText">
                <h6><i class="bi bi-eye me-1"></i>Preview</h6>
                <div v-html="formatContent(composeText)"></div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="filePickerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add File</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="file" class="form-control" @change="handleFileSelect" multiple>
                    <div v-if="driveFiles.length > 0" class="mt-4">
                        <h6>Drive Files</h6>
                        <div class="d-flex flex-wrap gap-3 mt-3">
                            <div v-for="file in driveFiles" :key="file.id" class="p-2 border rounded" 
                                 style="cursor:pointer" @click="selectDriveFile(file)">
                                <img v-if="file.type && file.type.startsWith('image/')" 
                                     :src="file.thumbnailUrl || file.url" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">
                                <div v-else style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--text-muted);">
                                    <i class="bi bi-file-earmark"></i>
                                </div>
                                <div class="small text-truncate" style="max-width:80px;">[[ file.name ]]</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="tagInputModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Tag</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" v-model="newTag" @keyup.enter="confirmAddTag" placeholder="Enter tag">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" @click="confirmAddTag">Add</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="scheduleModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Schedule Post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Date & Time</label>
                    <input type="datetime-local" class="form-control" v-model="scheduleDatetime">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" @click="cancelSchedule">Cancel</button>
                    <button class="btn btn-primary" @click="confirmSchedule">Schedule</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const translations = {
            en: {
                'placeholder': "What's happening?", 'compose': 'Compose', 'bold': 'Bold', 'italic': 'Italic',
                'strike': 'Strikethrough', 'code': 'Code', 'link': 'Link', 'ruby': 'Ruby', 'center': 'Center',
                'quote': 'Quote', 'file': 'File', 'tag': 'Tag', 'schedule': 'Schedule', 'cw': 'CW',
                'public': 'Public', 'home': 'Home', 'followers': 'Followers', 'specified': 'Specified',
                'post': 'Post', 'preview': 'Preview', 'add_file': 'Add File', 'choose_file': 'Choose file',
                'drive_files': 'Drive Files', 'add_tag': 'Add Tag', 'tag_placeholder': 'Enter tag', 'add': 'Add',
                'schedule_post': 'Schedule Post', 'date_time': 'Date & Time', 'cancel': 'Cancel',
                'scheduled': 'Scheduled', 'content_warning': 'Content warning'
            },
            'zh-CN': {
                'placeholder': '分享新鲜事...', 'compose': '发布', 'bold': '粗体', 'italic': '斜体',
                'strike': '删除线', 'code': '代码', 'link': '链接', 'ruby': '注音', 'center': '居中',
                'quote': '引用', 'file': '文件', 'tag': '标签', 'schedule': '定时', 'cw': '警告',
                'public': '公开', 'home': '主页', 'followers': '关注者', 'specified': '指定',
                'post': '发布', 'preview': '预览', 'add_file': '添加文件', 'choose_file': '选择文件',
                'drive_files': '网盘文件', 'add_tag': '添加标签', 'tag_placeholder': '输入标签', 'add': '添加',
                'schedule_post': '定时发布', 'date_time': '日期时间', 'cancel': '取消',
                'scheduled': '已定时', 'content_warning': '内容警告'
            }
        };

        async function getLang() {
            try {
                const res = await fetch('/api/local-settings?key=language');
                const data = await res.json();
                return data.value || 'en';
            } catch { return 'en'; }
        }

        function t(key) {
            const lang = localStorage.getItem('misskey_language') || 'en';
            return translations[lang]?.[key] || translations.en[key] || key;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            toast.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle-fill' : type === 'error' ? 'bi-x-circle-fill' : 'bi-info-circle-fill'}" style="font-size:1.5rem;color:var(--primary-color)"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        createApp({
            delimiters: ['[[', ']]'],
            data() {
                return {
                    lang: 'en', composeText: '', composeVisibility: 'public', composeCw: '', composeFiles: [],
                    composeTags: [], scheduledTime: null, posting: false, showCwInput: false,
                    showFilePicker: false, showTagInput: false, showScheduleInput: false,
                    driveFiles: [], newTag: '', scheduleDatetime: ''
                }
            },
            computed: { 
                canPost() { return this.composeText.trim() || this.composeFiles.length > 0; },
                tr() { return (key) => translations[this.lang]?.[key] || translations.en[key] || key; }
            },
            async mounted() { 
                this.lang = localStorage.getItem('misskey_language') || 'en';
                await this.loadDriveFiles(); 
            },
            methods: {
                insertMFM(before, after) {
                    const textarea = this.$refs.textarea;
                    const start = textarea.selectionStart;
                    const text = this.composeText;
                    this.composeText = text.substring(0, start) + before + after + text.substring(start);
                    this.$nextTick(() => { textarea.focus(); });
                },
                async handleFileSelect(event) {
                    for (let i = 0; i < event.target.files.length; i++) {
                        await this.uploadFile(event.target.files[i]);
                    }
                },
                async uploadFile(file) {
                    try {
                        const formData = new FormData();
                        formData.append('file', file);
                        const res = await fetch('/api/drive/files/create', { method: 'POST', body: formData });
                        const data = await res.json();
                        if (!data.error) { this.composeFiles.push(data); showToast('File uploaded!'); }
                        else showToast(data.error, 'error');
                    } catch (e) { showToast('Upload failed: ' + e, 'error'); }
                    bootstrap.Modal.getInstance(document.getElementById('filePickerModal'))?.hide();
                },
                async loadDriveFiles() {
                    try {
                        const res = await fetch('/api/drive/files');
                        const data = await res.json();
                        if (Array.isArray(data)) this.driveFiles = data.slice(0, 20);
                    } catch (e) { console.error(e); }
                },
                selectDriveFile(file) { this.composeFiles.push(file); bootstrap.Modal.getInstance(document.getElementById('filePickerModal'))?.hide(); },
                removeFile(index) { this.composeFiles.splice(index, 1); },
                confirmAddTag() { if (this.newTag.trim()) { this.composeTags.push(this.newTag.trim()); this.newTag = ''; } bootstrap.Modal.getInstance(document.getElementById('tagInputModal'))?.hide(); },
                removeTag(tag) { const i = this.composeTags.indexOf(tag); if (i > -1) this.composeTags.splice(i, 1); },
                confirmSchedule() { if (this.scheduleDatetime) this.scheduledTime = new Date(this.scheduleDatetime).toISOString(); bootstrap.Modal.getInstance(document.getElementById('scheduleModal'))?.hide(); },
                cancelSchedule() { this.scheduledTime = null; bootstrap.Modal.getInstance(document.getElementById('scheduleModal'))?.hide(); },
                formatScheduleTime(t) { return new Date(t).toLocaleString(); },
                async postNote() {
                    if (!this.canPost) return;
                    this.posting = true;
                    try {
                        let endpoint = '/api/notes/create';
                        let body = { text: this.composeText, visibility: this.composeVisibility };
                        if (this.composeCw) body.cw = this.composeCw;
                        if (this.composeFiles.length > 0) body.fileIds = this.composeFiles.map(f => f.id);
                        if (this.composeTags.length > 0) body.text += this.composeTags.map(t => ` #${t}`).join('');
                        if (this.scheduledTime) { endpoint = '/api/notes/schedule'; body.scheduled_at = this.scheduledTime; }
                        
                        const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
                        const data = await res.json();
                        if (!data.error) {
                            showToast(this.scheduledTime ? 'Scheduled!' : 'Posted!', 'success');
                            setTimeout(() => window.location.href = '/', 1000);
                        } else { showToast(data.error, 'error'); }
                    } catch (e) { showToast('Failed: ' + e, 'error'); }
                    this.posting = false;
                },
                formatContent(text) {
                    text = text.replace(/https?:\/\/[^\s]+/g, '<a class="text-primary" href="$&" target="_blank">$&</a>');
                    text = text.replace(/#[^\s]+/g, m => `<span class="text-primary">${m}</span>`);
                    text = text.replace(/@[a-zA-Z0-9_]+@[a-zA-Z0-9_.-]+/g, m => `<span class="text-info">${m}</span>`);
                    text = text.replace(/@[a-zA-Z0-9_]+/g, m => `<span class="text-info">${m}</span>`);
                    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                    text = text.replace(/~~([^~]+)~~/g, '<del>$1</del>');
                    text = text.replace(/`([^`]+)`/g, '<code class="bg-light p-1 rounded">$1</code>');
                    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a class="text-primary" href="$2" target="_blank">$1</a>');
                    text = text.replace(/^> (.+)$/gm, '<blockquote class="border-start border-3 border-primary ps-3">$1</blockquote>');
                    return text;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
