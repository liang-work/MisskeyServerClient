<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Misskey Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --primary-color: #4a9eff;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark-theme {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e8e8e8;
            --text-muted: #a0a0a0;
            --border-color: #2a2a4a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: var(--transition);
            min-height: 100vh;
        }
        .navbar {
            background: var(--primary-gradient) !important;
            box-shadow: var(--shadow-md);
        }
        .settings-container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .settings-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 1.5rem;
        }
        .settings-section {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .settings-section:last-child { border-bottom: none; }
        .theme-btn {
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }
        .theme-btn:hover, .theme-btn.active {
            border-color: var(--primary-color);
            background: rgba(74, 158, 255, 0.1);
        }
        .lang-option {
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 0.5rem;
        }
        .lang-option:hover, .lang-option.active {
            border-color: var(--primary-color);
            background: rgba(74, 158, 255, 0.1);
        }
        .about-card {
            background: var(--primary-gradient);
            color: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
        }
        .about-card h3 { margin-bottom: 1rem; }
        .about-card .version {
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
        }
        .custom-toast {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid var(--primary-color);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="/">
                <i class="bi bi-chat-quote me-2"></i>Misskey
            </a>
            <a href="/" class="btn btn-light btn-sm">
                <i class="bi bi-house me-1"></i>Home
            </a>
        </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>

    <div class="settings-container">
        <div class="settings-card animate__animated animate__fadeInUp">
            <h4 class="mb-4 fw-bold">
                <i class="bi bi-gear me-2" style="color: var(--primary-color);"></i>[[ tr('settings') ]]
            </h4>
            
            <div class="settings-section">
                <h6 class="mb-3"><i class="bi bi-palette me-2"></i>[[ tr('appearance') ]]</h6>
                <div class="row">
                    <div class="col-6">
                        <div class="theme-btn" :class="{active: theme === 'light'}" @click="setTheme('light')">
                            <i class="bi bi-sun fs-4 d-block mb-2"></i>
                            <span>[[ tr('light') ]]</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="theme-btn" :class="{active: theme === 'dark'}" @click="setTheme('dark')">
                            <i class="bi bi-moon fs-4 d-block mb-2"></i>
                            <span>[[ tr('dark') ]]</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="settings-section">
                <h6 class="mb-3"><i class="bi bi-translate me-2"></i>[[ tr('language') ]]</h6>
                <div class="lang-option" :class="{active: language === 'en'}" @click="setLanguage('en')">
                    <i class="bi bi-check-circle-fill me-2" v-if="language === 'en'"></i>
                    English
                </div>
                <div class="lang-option" :class="{active: language === 'zh-CN'}" @click="setLanguage('zh-CN')">
                    <i class="bi bi-check-circle-fill me-2" v-if="language === 'zh-CN'"></i>
                    简体中文
                </div>
            </div>
            
            <div class="settings-section">
                <h6 class="mb-3"><i class="bi bi-person me-2"></i>Profile</h6>
                <button class="btn btn-outline-primary" @click="showProfileModal = true">
                    <i class="bi bi-pencil me-2"></i>Edit Profile
                </button>
            </div>
            
            <div class="settings-section">
                <h6 class="mb-3"><i class="bi bi-cloud me-2"></i>Drive</h6>
                <a href="/drive" class="btn btn-outline-primary">
                    <i class="bi bi-folder me-2"></i>Manage Drive
                </a>
            </div>
            
            <div class="settings-section">
                <h6 class="mb-3"><i class="bi bi-box-arrow-right me-2"></i>Account</h6>
                <button class="btn btn-outline-danger" @click="logout">
                    <i class="bi bi-power me-2"></i>Logout
                </button>
            </div>
        </div>
        
        <div class="about-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
            <i class="bi bi-chat-quote fs-1 mb-3"></i>
            <h3>Misskey Client</h3>
            <p>A beautiful web client for Misskey</p>
            <div class="version">Version 1.0.0</div>
            <div class="mt-3" style="font-size: 0.85rem; opacity: 0.8;">
                <p>Built with Vue.js + Bootstrap</p>
                <p>&copy; 2024 Misskey Client</p>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="profileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Display Name</label>
                        <input type="text" class="form-control" v-model="profileData.name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio</label>
                        <textarea class="form-control" v-model="profileData.description" rows="4"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" v-model="profileData.location">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Birthday</label>
                        <input type="date" class="form-control" v-model="profileData.birthday">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" @click="saveProfile" :disabled="saving">
                        <span v-if="saving" class="spinner-border spinner-border-sm me-1"></span>
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const translations = {
            en: {
                'settings': 'Settings', 'appearance': 'Appearance', 'light': 'Light', 'dark': 'Dark',
                'language': 'Language', 'profile': 'Profile', 'edit_profile': 'Edit Profile',
                'drive': 'Drive', 'manage_drive': 'Manage Drive', 'account': 'Account', 'logout': 'Logout',
                'about': 'About', 'version': 'Version', 'display_name': 'Display Name', 'bio': 'Bio',
                'location': 'Location', 'birthday': 'Birthday', 'save': 'Save', 'cancel': 'Cancel'
            },
            'zh-CN': {
                'settings': '设置', 'appearance': '外观', 'light': '浅色', 'dark': '深色',
                'language': '语言', 'profile': '个人资料', 'edit_profile': '编辑资料',
                'drive': '云盘', 'manage_drive': '管理云盘', 'account': '账户', 'logout': '退出',
                'about': '关于', 'version': '版本', 'display_name': '显示名称', 'bio': '简介',
                'location': '位置', 'birthday': '生日', 'save': '保存', 'cancel': '取消'
            }
        };

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-info-circle-fill'}" style="font-size:1.5rem;color:var(--primary-color)"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function dbInit() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MisskeyClientDB', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
                };
            });
        }

        async function dbGet(key) {
            return new Promise((resolve) => {
                const request = indexedDB.open('MisskeyClientDB', 1);
                request.onsuccess = () => {
                    const db = request.result;
                    const tx = db.transaction('settings', 'readonly');
                    const store = tx.objectStore('settings');
                    const getRequest = store.get(key);
                    getRequest.onsuccess = () => resolve(getRequest.result?.value);
                };
            });
        }

        async function dbPut(key, value) {
            return new Promise((resolve) => {
                const request = indexedDB.open('MisskeyClientDB', 1);
                request.onsuccess = () => {
                    const db = request.result;
                    const tx = db.transaction('settings', 'readwrite');
                    const store = tx.objectStore('settings');
                    store.put({ key, value });
                    tx.oncomplete = () => resolve();
                };
            });
        }

        createApp({
            delimiters: ['[[', ']]'],
            data() {
                return { theme: 'light', language: 'en', showProfileModal: false, profileData: {}, saving: false };
            },
            computed: {
                tr() {
                    return (key) => translations[this.language]?.[key] || translations.en[key] || key;
                }
            },
            async mounted() {
                await dbInit();
                this.theme = await dbGet('theme') || 'light';
                this.language = await dbGet('language') || 'en';
                this.applyTheme();
            },
            methods: {
                applyTheme() {
                    if (this.theme === 'dark') document.body.classList.add('dark-theme');
                    else document.body.classList.remove('dark-theme');
                },
                async setTheme(t) {
                    this.theme = t;
                    this.applyTheme();
                    await dbPut('theme', t);
                    showToast('Theme updated!', 'success');
                },
                async setLanguage(l) {
                    this.language = l;
                    await dbPut('language', l);
                    showToast('Language updated!', 'success');
                },
                async loadProfileData() {
                    try {
                        const res = await fetch('/api/i');
                        const data = await res.json();
                        if (data) this.profileData = { name: data.name || '', description: data.description || '', location: data.location || '', birthday: data.birthday || '' };
                    } catch (e) { console.error(e); }
                },
                async saveProfile() {
                    this.saving = true;
                    try {
                        const res = await fetch('/api/users/profile', {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(this.profileData)
                        });
                        const data = await res.json();
                        if (!data.error) {
                            showToast('Profile saved!', 'success');
                            bootstrap.Modal.getInstance(document.getElementById('profileModal'))?.hide();
                        } else showToast(data.error, 'error');
                    } catch (e) { showToast('Failed: ' + e, 'error'); }
                    this.saving = false;
                },
                async logout() {
                    await fetch('/api/logout', {method: 'POST'});
                    showToast('Logged out!', 'success');
                    setTimeout(() => window.location.href = '/', 500);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
